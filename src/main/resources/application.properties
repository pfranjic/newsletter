spring.application.name=UserRegistrationDemo

spring.datasource.url=${Postgres.DATABASE_URL:jdbc:postgresql://localhost:5432/newsletter}
spring.datasource.username=${Postgres.PGUSER:newsletter}
spring.datasource.password=${Postgres.PGPASSWORD:newsletter}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true