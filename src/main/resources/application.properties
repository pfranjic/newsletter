spring.application.name=UserRegistrationDemo

spring.datasource.url=${Postgres.DATABASE_URL:jdbc:postgresql://localhost:5432/newsletter}
spring.datasource.username=${Postgres.PGUSER:newsletter}
spring.datasource.password=${Postgres.PGPASSWORD:newsletter}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
