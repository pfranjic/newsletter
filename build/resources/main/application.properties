spring.application.name=UserRegistrationDemo

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

external.email-service.url=${EXTERNAL_EMAIL_SERVICE_URL:https://example-email-service/api/send}
external.pdf-service.url=${EXTERNAL_PDF_SERVICE_URL:https://example-pdf-service/api/generate}
external.ip-geo-service.url=${EXTERNAL_IP_GEO_SERVICE_URL:http://ip-api.com/json}